<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Blue Triangle" />
  <meta name="description" content="パスワードの代わりに覚えやすくて強固なパスフレーズを生成します。日本語のパスフレーズ生成に特化しています。" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)" />
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="日本語パスフレーズジェネレーター" />
  <meta property="og:description" content="パスワードの代わりに覚えやすくて強固なパスフレーズを生成します。日本語のパスフレーズ生成に特化しています。" />
  <meta property="og:url" content="https://pasufure-zu.aosankaku.net/" />
  <meta property="og:image" content="https://pasufure-zu.aosankaku.net/og-image.png" />
  <meta property="og:locale" content="ja_JP" />
  <!-- Twitter/X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="日本語パスフレーズジェネレーター" />
  <meta name="twitter:description" content="パスワードの代わりに覚えやすくて強固なパスフレーズを生成します。日本語のパスフレーズ生成に特化しています。" />
  <meta name="twitter:image" content="https://pasufure-zu.aosankaku.net/og-image.png" />
  <title>日本語パスフレーズジェネレーター</title>
  <!-- Runs synchronously before paint to avoid theme flash -->
  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
